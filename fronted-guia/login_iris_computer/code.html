<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Iris Computer - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            "borderRadius": {

                    "lg": "0.25rem",

            "spacing": {
                    "container-padding": "24px",
                    "gutter": "16px",

<style>
        body {
            background-color: #131315;
            color: #e4e2e4;
        }
        
        .glow-btn {
            box-shadow: 0px 0px 15px rgba(34, 211, 238, 0.3);
            transition: all 0.2s ease-in-out;
        }
        
        .glow-btn:hover {
            box-shadow: 0px 0px 25px rgba(34, 211, 238, 0.5);
            transform: translateY(-1px);
        }
        
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #161618 inset !important;
            -webkit-text-fill-color: #e4e2e4 !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-background relative overflow-hidden font-body-md text-body-md antialiased">
<div class="absolute inset-0 z-0">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>
<div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px] pointer-events-none"></div>
</div>
<div class="absolute inset-0 bg-background/40 backdrop-blur-sm z-0"></div>
<main class="w-full max-w-md p-container-padding z-10">
<div class="bg-[#202022] border border-outline-variant/30 rounded-xl p-8 shadow-2xl relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-50"></div>
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-[#161618] border border-outline-variant/50 mb-4 shadow-inner">
<span class="material-symbols-outlined text-primary-container text-2xl" data-icon="memory">memory</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Iris Computer</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-2 uppercase tracking-wider">ERP System Authentication</p>
</div>
<form action="#" class="space-y-6" method="POST" x-data="{ showPassword: false }">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2 uppercase" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-sm" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-[#161618] border border-[#374151] rounded-DEFAULT text-on-surface placeholder-outline focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-colors duration-200" id="email" name="email" placeholder="user@iriscomputer.com" required="" type="email"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2 uppercase" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-sm" data-icon="lock">lock</span>
</div>
<input :type="showPassword ? 'text' : 'password'" class="block w-full pl-10 pr-10 py-3 bg-[#161618] border border-[#374151] rounded-DEFAULT text-on-surface placeholder-outline focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-colors duration-200" id="password" name="password" placeholder="••••••••" required=""/>
<button @click="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary-container transition-colors duration-200" type="button">
<span class="material-symbols-outlined text-sm" x-text="showPassword ? 'visibility_off' : 'visibility'">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex items-center">
<input class="h-4 w-4 bg-[#161618] border-[#374151] rounded-DEFAULT text-primary-container focus:ring-primary-container/50 focus:ring-offset-[#202022]" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-sm">
<a class="font-body-md text-body-md text-primary-container hover:text-primary-container/80 transition-colors duration-200" href="#">
                            Forgot password?
                        </a>
</div>
</div>
<div class="pt-4">
<button class="glow-btn w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-DEFAULT font-label-md text-label-md uppercase tracking-wider text-black bg-[#22d3ee] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container focus:ring-offset-[#202022]" type="submit">
<span class="material-symbols-outlined mr-2 text-sm" data-icon="login">login</span>
                        Iniciar Sesión
                    </button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
<p class="font-label-sm text-label-sm text-outline uppercase tracking-wider flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="verified_user">verified_user</span>
                    Secure Connection
                </p>
</div>
</div>
</main>
</body></html>
